version: "3.8"

# Two usage modes:
#   1. Build + run locally:  docker compose up --build
#   2. Pull from Docker Hub: DOCKER_IMAGE=monarch1w/moji:latest docker compose up

services:
  app:
    image: ${DOCKER_IMAGE:-monarch1w/moji:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moji
    ports:
      - "${PORT:-5001}:5001"
    env_file:
      - server/.env
    environment:
      - NODE_ENV=production
      - PORT=5001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
