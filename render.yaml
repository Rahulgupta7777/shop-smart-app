services:
  - type: web
    name: moji
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npx prisma generate && npx prisma db push && cd ../client && npm install && npm run build
    startCommand: cd server && NODE_ENV=production node src/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
